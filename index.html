<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Pedidos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cor-primaria: #4da3ff;
      --cor-clara: #e6f2ff;
      --cor-fundo: #f9fbfd;
      --cor-texto: #333;
      --cor-borda: #ccc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--cor-fundo);
      color: var(--cor-texto);
      padding: 40px;
    }

    h1, h2 {
      color: var(--cor-primaria);
    }

    .titulo-centralizado {
      text-align: center;
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .search-container {
      flex: 1;
      max-width: 400px;
      margin-right: 20px;
    }

    .search-container input {
      width: 100%;
      padding: 10px 15px;
      border: 2px solid var(--cor-clara);
      border-radius: 25px;
      font-size: 14px;
      margin-bottom: 0;
      transition: border-color 0.3s ease;
    }

    .search-container input:focus {
      outline: none;
      border-color: var(--cor-primaria);
    }

    .subtitulo {
      font-size: 1.5em;
      color: var(--cor-primaria);
      margin: 40px 0 20px;
      border-bottom: 2px solid var(--cor-clara);
      padding-bottom: 5px;
    }

    button {
      background-color: var(--cor-primaria);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background-color: #3392f0;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow-y: auto;
      max-height: 90vh;
    }

    label {
      display: block;
      margin: 10px 0 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid var(--cor-borda);
      border-radius: 5px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
    }

    th, td {
      border: 1px solid var(--cor-borda);
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: var(--cor-clara);
    }

    td button {
      margin-right: 5px;
      padding: 5px 10px;
      font-size: 12px;
    }

    .tabs {
      display: flex;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--cor-clara);
    }

    .tab-button {
      background-color: transparent;
      color: var(--cor-texto);
      border: none;
      padding: 15px 25px;
      cursor: pointer;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .tab-button:hover {
      background-color: var(--cor-clara);
    }

    .tab-button.active {
      color: var(--cor-primaria);
      border-bottom-color: var(--cor-primaria);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1 class="titulo-centralizado">Sistema de Pedidos</h1>

  <div class="tabs">
    <button class="tab-button active" onclick="mostrarAba('pedidos')">Pedidos</button>
    <button class="tab-button" onclick="mostrarAba('materiais')">Lista de Material</button>
  </div>

  <div id="aba-pedidos" class="tab-content active">
    <div class="header-actions">
      <div class="search-container">
        <input type="text" id="searchPedidos" placeholder="🔍 Pesquisar por nº pedido, cliente ou data..." onkeyup="pesquisarPedidos()">
      </div>
      <button onclick="abrirModal()">Novo Pedido</button>
    </div>

    <h2 class="subtitulo">Pedidos Implantados</h2>

    <table id="tabelaPedidos">
      <thead>
        <tr>
          <th>Lote</th>
          <th>Nº Pedido</th>
          <th>Cliente</th>
          <th>Material</th>
          <th>Quantidade</th>
          <th>Unidade</th>
          <th>Observação</th>
          <th>Data/Hora</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="modal" id="pedidoModal">
    <div class="modal-content">
      <h2>Inserir Pedido</h2>
      <form id="formPedido">
        <label>Lote:</label><input type="text" name="lote" required />
        <label>Número do Pedido:</label><input type="text" name="numero" required />
        <label>Cliente:</label><input type="text" name="cliente" required />
        <label>Material:</label>
        <select name="material" id="selectMaterial" required>
          <option value="">Selecione um material...</option>
        </select>
        <label>Quantidade:</label><input type="number" step="0.01" name="quantidade" required />
        <label>Unidade de Medida:</label>
        <select name="unidade">
          <option>Und</option>
          <option>Pct</option>
          <option>M²</option>
          <option>M³</option>
          <option>Bloco</option>
          <option>Rolo</option>
          <option>KG</option>
        </select>
        <label>Observação:</label>
        <textarea name="observacao" rows="4"></textarea>
        <button type="submit">Salvar Pedido</button>
        <button type="button" onclick="fecharModal()" style="background-color: #ccc; color: #000;">Cancelar</button>
      </form>
    </div>
  </div>

  <div class="modal" id="materialModal">
    <div class="modal-content">
      <h2>Cadastrar Material</h2>
      <form id="formMaterial">
        <label>Descrição do Material:</label><input type="text" name="descricao" required />
        <label>Setor:</label><input type="text" name="setor" required />
        <label>Unidade de Medida:</label>
        <select name="unidade" onchange="verificarPacote()" required>
          <option value="">Selecione...</option>
          <option value="Und">Und</option>
          <option value="Pct">Pct</option>
          <option value="M²">M²</option>
          <option value="M³">M³</option>
          <option value="Rolo">Rolo</option>
          <option value="Bloco">Bloco</option>
          <option value="KG">KG</option>
          <option value="Saco">Saco</option>
        </select>
        <div id="campoPacote" style="display: none;">
          <label>Quantas unidades no pacote?</label>
          <input type="number" name="unidadesPacote" min="1" />
        </div>
        <button type="submit">Salvar Material</button>
        <button type="button" onclick="fecharModalMaterial()" style="background-color: #ccc; color: #000;">Cancelar</button>
      </form>
    </div>
  </div>

  <div id="aba-materiais" class="tab-content">
    <div class="header-actions">
      <div class="search-container">
        <input type="text" id="searchMateriais" placeholder="🔍 Pesquisar por material ou setor..." onkeyup="pesquisarMateriais()">
      </div>
      <button onclick="abrirModalMaterial()">Cadastrar Material</button>
    </div>

    <h2 class="subtitulo">Materiais Cadastrados</h2>

    <table id="tabelaMateriais">
      <thead>
        <tr>
          <th>Descrição do Material</th>
          <th>Setor</th>
          <th>Unidade</th>
          <th>Data/Hora</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <footer>
    Desenvolvido por @brunobranc
  </footer>

  <script>
    const modal = document.getElementById("pedidoModal");
    const form = document.getElementById("formPedido");
    const tabela = document.getElementById("tabelaPedidos").querySelector("tbody");
    
    const modalMaterial = document.getElementById("materialModal");
    const formMaterial = document.getElementById("formMaterial");
    const tabelaMaterial = document.getElementById("tabelaMateriais").querySelector("tbody");
    
    let pedidos = [];
    let materiais = [];
    let editIndex = null;
    let editMaterialIndex = null;

    const STORAGE_KEY = "pedidos-sistema";
    const STORAGE_KEY_MATERIAIS = "materiais-sistema";

    function abrirModal() {
      form.reset();
      editIndex = null;
      popularSelectMaterial();
      modal.style.display = "flex";
    }

    function popularSelectMaterial() {
      const selectMaterial = document.getElementById("selectMaterial");
      // Limpa as opções existentes (exceto a primeira)
      selectMaterial.innerHTML = '<option value="">Selecione um material...</option>';
      
      // Adiciona os materiais cadastrados
      materiais.forEach(material => {
        const option = document.createElement("option");
        option.value = material.descricao;
        option.textContent = `${material.descricao} - ${material.setor}`;
        selectMaterial.appendChild(option);
      });
    }

    function fecharModal() {
      modal.style.display = "none";
    }

    function salvarLocalStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(pedidos));
    }

    function carregarLocalStorage() {
      const dados = localStorage.getItem(STORAGE_KEY);
      return dados ? JSON.parse(dados) : [];
    }

    function salvarMateriaisLocalStorage() {
      localStorage.setItem(STORAGE_KEY_MATERIAIS, JSON.stringify(materiais));
    }

    function carregarMateriaisLocalStorage() {
      const dados = localStorage.getItem(STORAGE_KEY_MATERIAIS);
      return dados ? JSON.parse(dados) : [];
    }

    function mostrarAba(aba) {
      // Remove active de todas as abas
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      // Adiciona active na aba selecionada
      document.querySelector(`[onclick="mostrarAba('${aba}')"]`).classList.add('active');
      document.getElementById(`aba-${aba}`).classList.add('active');
    }

    function renderPedidos() {
      tabela.innerHTML = "";
      pedidos.forEach((pedido, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${pedido.lote}</td>
          <td>${pedido.numero}</td>
          <td>${pedido.cliente}</td>
          <td>${pedido.material}</td>
          <td>${pedido.quantidade}</td>
          <td>${pedido.unidade}</td>
          <td>${pedido.observacao}</td>
          <td>${pedido.dataHora}</td>
          <td>
            <button onclick="editarPedido(${index})">Editar</button>
            <button onclick="removerPedido(${index})" style="background:#eee;color:#333;">Excluir</button>
          </td>
        `;
        tabela.appendChild(row);
      });
    }

    function abrirModalMaterial() {
      formMaterial.reset();
      editMaterialIndex = null;
      modalMaterial.style.display = "flex";
    }

    function fecharModalMaterial() {
      modalMaterial.style.display = "none";
    }

    function verificarPacote() {
      const unidade = formMaterial.elements.unidade.value;
      const campoPacote = document.getElementById('campoPacote');
      
      if (unidade === 'Pct') {
        campoPacote.style.display = 'block';
        formMaterial.elements.unidadesPacote.required = true;
      } else {
        campoPacote.style.display = 'none';
        formMaterial.elements.unidadesPacote.required = false;
        formMaterial.elements.unidadesPacote.value = '';
      }
    }

    function renderMateriais() {
      tabelaMaterial.innerHTML = "";
      materiais.forEach((material, index) => {
        const row = document.createElement("tr");
        let unidadeTexto = material.unidade;
        if (material.unidade === 'Pct' && material.unidadesPacote) {
          unidadeTexto = `Pct (${material.unidadesPacote} und/pct)`;
        }
        
        row.innerHTML = `
          <td>${material.descricao}</td>
          <td>${material.setor}</td>
          <td>${unidadeTexto}</td>
          <td>${material.dataHora}</td>
          <td>
            <button onclick="editarMaterial(${index})">Editar</button>
            <button onclick="removerMaterial(${index})" style="background:#eee;color:#333;">Excluir</button>
          </td>
        `;
        tabelaMaterial.appendChild(row);
      });
    }

    function carregarPedidos() {
      pedidos = carregarLocalStorage();
      renderPedidos();
    }

    function carregarMateriais() {
      materiais = carregarMateriaisLocalStorage();
      renderMateriais();
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const dados = new FormData(form);
      const novoPedido = Object.fromEntries(dados.entries());
      
      // Verifica se o número do pedido já existe (somente para novos pedidos)
      if (editIndex === null) {
        const numeroExiste = pedidos.some(pedido => pedido.numero === novoPedido.numero);
        if (numeroExiste) {
          alert(`Erro: Já existe um pedido com o número "${novoPedido.numero}". Por favor, use um número diferente.`);
          return;
        }
      } else {
        // Para edição, verifica se o número não existe em outros pedidos
        const numeroExiste = pedidos.some((pedido, index) => 
          index !== editIndex && pedido.numero === novoPedido.numero
        );
        if (numeroExiste) {
          alert(`Erro: Já existe um pedido com o número "${novoPedido.numero}". Por favor, use um número diferente.`);
          return;
        }
      }
      
      // Adiciona data/hora atual
      novoPedido.dataHora = new Date().toLocaleString('pt-BR');

      if (editIndex !== null) {
        // Editando pedido existente
        pedidos[editIndex] = novoPedido;
      } else {
        // Novo pedido
        pedidos.push(novoPedido);
      }

      salvarLocalStorage();
      fecharModal();
      renderPedidos();
    });

    formMaterial.addEventListener("submit", (e) => {
      e.preventDefault();
      const dados = new FormData(formMaterial);
      const novoMaterial = Object.fromEntries(dados.entries());
      
      // Adiciona data/hora atual
      novoMaterial.dataHora = new Date().toLocaleString('pt-BR');

      if (editMaterialIndex !== null) {
        // Editando material existente
        materiais[editMaterialIndex] = novoMaterial;
      } else {
        // Novo material
        materiais.push(novoMaterial);
      }

      salvarMateriaisLocalStorage();
      fecharModalMaterial();
      renderMateriais();
    });

    function editarPedido(index) {
      const pedido = pedidos[index];
      popularSelectMaterial();
      for (let campo in pedido) {
        if (campo !== "dataHora" && form.elements[campo]) {
          form.elements[campo].value = pedido[campo];
        }
      }
      editIndex = index;
      modal.style.display = "flex";
    }

    function removerPedido(index) {
      if (confirm("Deseja realmente excluir este pedido?")) {
        pedidos.splice(index, 1);
        salvarLocalStorage();
        renderPedidos();
      }
    }

    function editarMaterial(index) {
      const material = materiais[index];
      for (let campo in material) {
        if (campo !== "dataHora" && formMaterial.elements[campo]) {
          formMaterial.elements[campo].value = material[campo];
        }
      }
      editMaterialIndex = index;
      // Verificar se deve mostrar campo de pacote
      verificarPacote();
      modalMaterial.style.display = "flex";
    }

    function removerMaterial(index) {
      if (confirm("Deseja realmente excluir este material?")) {
        materiais.splice(index, 1);
        salvarMateriaisLocalStorage();
        renderMateriais();
      }
    }

    function pesquisarPedidos() {
      const searchTerm = document.getElementById('searchPedidos').value.toLowerCase();
      const rows = document.querySelectorAll('#tabelaPedidos tbody tr');
      
      rows.forEach(row => {
        if (row.cells && row.cells.length >= 8) {
          const numero = row.cells[1].textContent.toLowerCase();
          const cliente = row.cells[2].textContent.toLowerCase();
          const dataHora = row.cells[7].textContent.toLowerCase();
          
          if (numero.includes(searchTerm) || cliente.includes(searchTerm) || dataHora.includes(searchTerm)) {
            row.style.display = '';
          } else {
            row.style.display = 'none';
          }
        }
      });
    }

    function pesquisarMateriais() {
      const searchTerm = document.getElementById('searchMateriais').value.toLowerCase();
      const rows = document.querySelectorAll('#tabelaMateriais tbody tr');
      
      rows.forEach(row => {
        if (row.cells && row.cells.length >= 2) {
          const descricao = row.cells[0].textContent.toLowerCase();
          const setor = row.cells[1].textContent.toLowerCase();
          
          if (descricao.includes(searchTerm) || setor.includes(searchTerm)) {
            row.style.display = '';
          } else {
            row.style.display = 'none';
          }
        }
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      carregarPedidos();
      carregarMateriais();
    });
  </script>
</body>
</html>
